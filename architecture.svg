<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00FFCC" opacity="0.8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FF4444" opacity="0.8"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E3B341" opacity="0.8"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#00FFCC" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/> <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/> <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/> <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="420" x2="900" y2="420"/> <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="540" x2="900" y2="540"/>
    <line x1="90" y1="0" x2="90" y2="620"/>  <line x1="180" y1="0" x2="180" y2="620"/>
    <line x1="270" y1="0" x2="270" y2="620"/> <line x1="360" y1="0" x2="360" y2="620"/>
    <line x1="450" y1="0" x2="450" y2="620"/> <line x1="540" y1="0" x2="540" y2="620"/>
    <line x1="630" y1="0" x2="630" y2="620"/> <line x1="720" y1="0" x2="720" y2="620"/>
    <line x1="810" y1="0" x2="810" y2="620"/>
  </g>

  <!-- Left circuit decoration -->
  <g opacity="0.15" stroke="#00FFCC" stroke-width="1" fill="none">
