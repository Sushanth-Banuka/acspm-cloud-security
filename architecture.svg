    <circle cx="70" cy="200" r="3" fill="#00FFCC"/>
    <circle cx="150" cy="130" r="3" fill="#00FFCC"/>
    <polyline points="0,320 50,320 50,380 120,380 120,340 180,340"/>
    <circle cx="50" cy="320" r="3" fill="#00FFCC"/>
    <circle cx="120" cy="380" r="3" fill="#00FFCC"/>
  </g>

  <!-- Right circuit decoration -->
  <g opacity="0.15" stroke="#FF4444" stroke-width="1" fill="none">
    <polyline points="900,180 820,180 820,250 750,250 750,210 690,210"/>
    <circle cx="820" cy="180" r="3" fill="#FF4444"/>
    <circle cx="750" cy="250" r="3" fill="#FF4444"/>
    <polyline points="900,360 840,360 840,300 780,300 780,340 720,340"/>
    <circle cx="840" cy="360" r="3" fill="#FF4444"/>
    <circle cx="780" cy="300" r="3" fill="#FF4444"/>
