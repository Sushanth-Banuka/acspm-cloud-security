  <rect x="0" y="0" width="4" height="620" fill="#00FFCC" opacity="0.6"/>
  <rect x="896" y="0" width="4" height="620" fill="#FF4444" opacity="0.4"/>
  <rect x="0" y="0" width="900" height="2" fill="#00FFCC" opacity="0.08"/>
  <rect x="0" y="618" width="900" height="2" fill="#00FFCC" opacity="0.08"/>

